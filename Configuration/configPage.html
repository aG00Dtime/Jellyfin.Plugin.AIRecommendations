<!DOCTYPE html>
<html>
<head>
    <title>AI Recommendations</title>
</head>
<body>
    <div id="configPage" data-role="page" class="page type-interior pluginConfigurationPage configPage" data-require="emby-input,emby-button,emby-select">
        <div data-role="content">
            <div class="content-primary">
                <h1>AI Recommendations</h1>
                <p>Configure your LLM provider and TMDB key. Per-user virtual libraries are created automatically.</p>
                <form class="configForm">
                    <div class="selectContainer">
                        <label class="selectLabel" for="activeProvider">LLM Provider</label>
                        <select is="emby-select" id="activeProvider" class="emby-select-withcolor">
                            <option value="OpenAI">OpenAI</option>
                            <option value="OpenRouter">OpenRouter</option>
                            <option value="Ollama">Ollama</option>
                        </select>
                    </div>

                    <h3>OpenAI</h3>
                    <div class="inputContainer">
                        <input is="emby-input" type="password" id="openAiApiKey" label="OpenAI API Key" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="openAiModel" label="OpenAI Model" />
                    </div>

                    <h3>OpenRouter</h3>
                    <div class="inputContainer">
                        <input is="emby-input" type="password" id="openRouterApiKey" label="OpenRouter API Key" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="openRouterModel" label="OpenRouter Model" />
                    </div>

                    <h3>Ollama</h3>
                    <div class="selectContainer">
                        <label class="selectLabel" for="ollamaDeployment">Ollama Deployment</label>
                        <select is="emby-select" id="ollamaDeployment" class="emby-select-withcolor">
                            <option value="Local">Local (localhost:11434)</option>
                            <option value="Cloud">Cloud (ollama.com)</option>
                        </select>
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="ollamaBaseUrl" label="Ollama Base URL" />
                        <div class="fieldDescription">Local: http://localhost:11434 — Cloud: https://ollama.com</div>
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="password" id="ollamaApiKey" label="Ollama API Key (required for Cloud)" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="ollamaModel" label="Ollama Model" />
                    </div>

                    <h3>TMDB</h3>
                    <div class="inputContainer">
                        <input is="emby-input" type="password" id="tmdbApiKey" label="TMDB API Key" />
                        <div class="fieldDescription">Required to resolve posters and metadata. Get a free key at themoviedb.org.</div>
                    </div>

                    <h3>Limits</h3>
                    <div class="inputContainer">
                        <input is="emby-input" type="number" id="maxRecommendationsPerType" min="5" max="100" label="Max recommendations per type (movies + shows)" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="number" id="syncIntervalHours" min="1" max="168" label="Sync interval (hours)" />
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input is="emby-checkbox" type="checkbox" id="limitShowsToSeasonOne" />
                            <span>Only create Season 1 stubs for TV shows</span>
                        </label>
                    </div>

                    <br />
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var AIRecommendationsConfig = {
                uniquePluginId: "7c4a9e2b-3f1d-4a8c-b6e5-2d9f8a1c0b3e"
            };

            document.querySelector('.configPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(AIRecommendationsConfig.uniquePluginId).then(function (config) {
                        document.querySelector('#activeProvider').value = config.ActiveProvider || 'OpenAI';
                        document.querySelector('#openAiApiKey').value = config.OpenAiApiKey || '';
                        document.querySelector('#openAiModel').value = config.OpenAiModel || 'gpt-4o-mini';
                        document.querySelector('#openRouterApiKey').value = config.OpenRouterApiKey || '';
                        document.querySelector('#openRouterModel').value = config.OpenRouterModel || 'openai/gpt-4o-mini';
                        document.querySelector('#ollamaDeployment').value = config.OllamaDeployment || 'Local';
                        document.querySelector('#ollamaBaseUrl').value = config.OllamaBaseUrl || 'http://localhost:11434';
                        document.querySelector('#ollamaApiKey').value = config.OllamaApiKey || '';
                        document.querySelector('#ollamaModel').value = config.OllamaModel || 'llama3.2';
                        document.querySelector('#tmdbApiKey').value = config.TmdbApiKey || '';
                        document.querySelector('#maxRecommendationsPerType').value = config.MaxRecommendationsPerType || 25;
                        document.querySelector('#syncIntervalHours').value = config.SyncIntervalHours || 24;
                        document.querySelector('#limitShowsToSeasonOne').checked = config.LimitShowsToSeasonOne !== false;
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('.configForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(AIRecommendationsConfig.uniquePluginId).then(function (config) {
                        config.ActiveProvider = document.querySelector('#activeProvider').value;
                        config.OpenAiApiKey = document.querySelector('#openAiApiKey').value;
                        config.OpenAiModel = document.querySelector('#openAiModel').value;
                        config.OpenRouterApiKey = document.querySelector('#openRouterApiKey').value;
                        config.OpenRouterModel = document.querySelector('#openRouterModel').value;
                        config.OllamaDeployment = document.querySelector('#ollamaDeployment').value;
                        config.OllamaBaseUrl = document.querySelector('#ollamaBaseUrl').value;
                        config.OllamaApiKey = document.querySelector('#ollamaApiKey').value;
                        config.OllamaModel = document.querySelector('#ollamaModel').value;
                        config.TmdbApiKey = document.querySelector('#tmdbApiKey').value;
                        config.MaxRecommendationsPerType = parseInt(document.querySelector('#maxRecommendationsPerType').value, 10);
                        config.SyncIntervalHours = parseInt(document.querySelector('#syncIntervalHours').value, 10);
                        config.LimitShowsToSeasonOne = document.querySelector('#limitShowsToSeasonOne').checked;
                        ApiClient.updatePluginConfiguration(AIRecommendationsConfig.uniquePluginId, config).then(function () {
                            Dashboard.processPluginConfigurationUpdateResult();
                        });
                    });
                });
        </script>
    </div>
</body>
</html>
