name: Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Create ZIP
      run: |
        cd bin/Release/net9.0
        zip -j Jellyfin.Plugin.AIRecommendations.zip Jellyfin.Plugin.AIRecommendations.dll

    - name: Sync and verify manifest checksum
      run: |
        chmod +x scripts/sync-manifest-checksum.sh scripts/verify-version.ps1 2>/dev/null || true
        ./scripts/sync-manifest-checksum.sh
        VERIFY_ZIP_CHECKSUM=1 pwsh -NoProfile -File scripts/verify-version.ps1 2>/dev/null || \
        VERIFY_ZIP_CHECKSUM=1 powershell -NoProfile -File scripts/verify-version.ps1

    - name: Test build artifacts
      run: |
        test -f "bin/Release/net9.0/Jellyfin.Plugin.AIRecommendations.dll"
        test -f "bin/Release/net9.0/Jellyfin.Plugin.AIRecommendations.zip"
