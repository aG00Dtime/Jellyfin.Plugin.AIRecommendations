name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Get version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Compute release metadata
      id: meta
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TARGET_ABI="10.11.9.0"
        if [ "$VERSION" = "1.0.4" ] || [ "$VERSION" = "1.0.3" ] || [ "$VERSION" = "1.0.2" ]; then TARGET_ABI="10.11.0.0"; fi
        if [ "$VERSION" = "1.0.1" ]; then TARGET_ABI="10.10.0.0"; fi
        if [ "$VERSION" = "1.0.0" ]; then TARGET_ABI="10.9.0.0"; fi
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        echo "targetAbi=$TARGET_ABI" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

    - name: Update .csproj version
      run: |
        VERSION=${{ steps.version.outputs.version }}
        sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>$VERSION.0<\/AssemblyVersion>/" Jellyfin.Plugin.AIRecommendations.csproj
        sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>$VERSION.0<\/FileVersion>/" Jellyfin.Plugin.AIRecommendations.csproj

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Create ZIP with meta.json
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TARGET_ABI=${{ steps.meta.outputs.targetAbi }}
        TIMESTAMP=${{ steps.meta.outputs.timestamp }}

        cat > bin/Release/net9.0/meta.json << EOF
        {
          "category": "General",
          "changelog": "Release $VERSION",
          "description": "Per-user AI movie and TV recommendations synced to virtual libraries on all Jellyfin clients",
          "guid": "7c4a9e2b-3f1d-4a8c-b6e5-2d9f8a1c0b3e",
          "imageUrl": "",
          "name": "AI Recommendations",
          "overview": "LLM-powered recommendations via OpenAI, OpenRouter, or Ollama",
          "owner": "aG00Dtime",
          "targetAbi": "$TARGET_ABI",
          "timestamp": "$TIMESTAMP",
          "version": "$VERSION.0"
        }
        EOF

        cd bin/Release/net9.0
        zip -j Jellyfin.Plugin.AIRecommendations.zip Jellyfin.Plugin.AIRecommendations.dll meta.json

    - name: Calculate checksum
      id: checksum
      run: |
        CHECKSUM=$(md5sum bin/Release/net9.0/Jellyfin.Plugin.AIRecommendations.zip | awk '{print $1}')
        echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
        echo "Checksum: $CHECKSUM"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: bin/Release/net9.0/Jellyfin.Plugin.AIRecommendations.zip
        body: |
          ## Jellyfin AI Recommendations v${{ steps.version.outputs.version }}

          Requires Jellyfin **10.11.x** (use v1.0.1 for 10.10.x).

          ### Installation
          Add this URL to Jellyfin > Dashboard > Plugins > Repositories:
          ```
          https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
          ```

          ### Checksums
          - MD5: ${{ steps.checksum.outputs.checksum }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update manifest on main and push
      run: |
        VERSION=${{ steps.version.outputs.version }}
        CHECKSUM=${{ steps.checksum.outputs.checksum }}
        TARGET_ABI=${{ steps.meta.outputs.targetAbi }}
        TIMESTAMP=${{ steps.meta.outputs.timestamp }}

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git fetch origin main
        git checkout main

        echo "$VERSION" > VERSION.txt
        sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>$VERSION.0<\/AssemblyVersion>/" Jellyfin.Plugin.AIRecommendations.csproj
        sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>$VERSION.0<\/FileVersion>/" Jellyfin.Plugin.AIRecommendations.csproj

        jq --arg version "$VERSION.0" \
           --arg changelog "Release $VERSION" \
           --arg abi "$TARGET_ABI" \
           --arg url "https://github.com/${{ github.repository }}/releases/download/v$VERSION/Jellyfin.Plugin.AIRecommendations.zip" \
           --arg checksum "$CHECKSUM" \
           --arg ts "$TIMESTAMP" \
           '(.[0].versions |= map(select(.version != $version))) |
            .[0].versions = [{
              version: $version,
              changelog: $changelog,
              targetAbi: $abi,
              sourceUrl: $url,
              checksum: $checksum,
              timestamp: $ts
            }] + .[0].versions' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

        ACTUAL=$(jq -r --arg v "$VERSION.0" '.[0].versions[] | select(.version == $v) | .checksum' manifest.json)
        if [ "$ACTUAL" != "$CHECKSUM" ]; then
          echo "ERROR: manifest checksum mismatch after update (expected $CHECKSUM, got $ACTUAL)"
          exit 1
        fi

        git add manifest.json Jellyfin.Plugin.AIRecommendations.csproj VERSION.txt
        git commit -m "chore: update manifest for v$VERSION [skip ci]" || echo "No changes to commit"
        git push origin main
